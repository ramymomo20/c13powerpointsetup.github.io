<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lobby Display | AFSCME13</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Libre+Franklin:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/base.css?v=20260313h">
  <link rel="stylesheet" href="./css/display.css?v=20260313h">
</head>
<body class="display-body">
  <div class="display-actions">
    <button id="fullscreenBtn" class="btn btn-small" type="button">Enter Fullscreen</button>
  </div>
  <main class="display-shell">
    <header class="display-header">
      <div class="display-logo-wrap">
        <img id="displayLogo" class="display-logo" src="./assets/AFSCME-Logo-112531210.png" alt="AFSCME Council 13">
      </div>
      <div class="header-main">
        <div>
          <p class="eyebrow">AFSCME Council 13</p>
          <h1 id="displayTitle">Today's Events</h1>
          <p id="viewDescription" class="view-description">Morning and evening schedule automatically follows Eastern Time.</p>
        </div>
      </div>
      <div id="displayPhotoCard" class="display-photo-card hidden">
        <img id="displayPhoto" class="display-photo" src="" alt="Display artwork">
      </div>
      <div class="header-meta">
        <p id="displayDate" class="meta-date">--</p>
        <p id="displayTime" class="meta-time">--</p>
        <p id="modeBadge" class="mode-badge mode-live">LIVE</p>
      </div>
    </header>

    <section id="eventsContainer" class="rooms-grid" aria-live="polite"></section>

    <section id="emptyState" class="empty-state hidden">
      <h2>No meetings scheduled</h2>
      <p>There are no visible items for this time block.</p>
    </section>

    <footer class="display-footer">
      <p id="statusText" class="status-hidden">Loading schedule...</p>
    </footer>
  </main>

  <script type="module" src="./js/display.js?v=20260313h"></script>
</body>
</html>
